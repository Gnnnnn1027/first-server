<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #87CEEB, #ffffff);
            margin: 0;
            padding: 0;
        }
        h1 {
            margin-top: 20px;
            color: #333;
        }
        .choices {
            margin: 20px 0;
        }
        .choices button {
            padding: 10px 20px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #4CAF50;
            color: white;
            transition: background-color 0.3s;
        }
        .choices button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>가위바위보 게임</h1>
    <div class="choices">
        <button onclick="playGame('가위')">가위</button>
        <button onclick="playGame('바위')">바위</button>
        <button onclick="playGame('보')">보</button>
    </div>
    <div class="result">
        <p id="user-choice">당신의 선택: </p>
        <p id="computer-choice">컴퓨터의 선택: </p>
        <p id="game-result">결과: </p>
    </div>

    <script>
        function playGame(userChoice) {
            const choices = ['가위', '바위', '보'];
            const computerChoice = choices[Math.floor(Math.random() * choices.length)];

            // 결과 계산
            let result = '';
            if (userChoice === computerChoice) {
                result = '무승부!';
            } else if (
                (userChoice === '가위' && computerChoice === '보') ||
                (userChoice === '바위' && computerChoice === '가위') ||
                (userChoice === '보' && computerChoice === '바위')
            ) {
                result = '승리!';
            } else {
                result = '패배!';
            }

            // 결과 표시
            document.getElementById('user-choice').innerText = `당신의 선택: ${userChoice}`;
            document.getElementById('computer-choice').innerText = `컴퓨터의 선택: ${computerChoice}`;
            document.getElementById('game-result').innerText = `결과: ${result}`;
        }
    </script>
</body>
</html>
